# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: Generate Snake

# Controls when the action will run. This action runs every 6 hours.

on:
  schedule:
      # every 6 hours
    - cron: "0 */6 * * *"

# This command allows us to run the Action automatically from the Actions tab.
  workflow_dispatch:

# The sequence of runs in this workflow:
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

    # Checks repo under $GITHUB_WORKSHOP, so your job can access it
      - uses: actions/checkout@v2

    # Generates the snake, themed in purple to match the profile's overall feel
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: happychristian777
          # The snake eats contributions using a purple gradient so it blends with the tokyonight theme.
          # Two variants: a dark one for GitHub's dark mode and a light one for light mode (wired up in the README <picture>).
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=a78bfa&color_dots=#161b22,#5b21b6,#7c3aed,#9f7aea,#c4b5fd
            dist/github-contribution-grid-snake-light.svg?palette=github-light&color_snake=7c3aed&color_dots=#ebedf0,#d8b4fe,#a78bfa,#7c3aed,#5b21b6

     # show the status of the build. Makes it easier for debugging (if there's any issues).
      - run: git status

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          # the output branch we mentioned above
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
